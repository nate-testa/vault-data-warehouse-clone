<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="robot-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#robot-gradient)" />
  
  <!-- Robot head (simplified FontAwesome robot style) -->
  <rect x="8" y="10" width="16" height="12" rx="2" ry="2" fill="white" />
  
  <!-- Robot antenna -->
  <rect x="15" y="6" width="2" height="4" fill="white" />
  <circle cx="16" cy="6" r="1" fill="#fbbf24" />
  
  <!-- Robot eyes -->
  <circle cx="12" cy="14" r="1.5" fill="#1e40af" />
  <circle cx="20" cy="14" r="1.5" fill="#1e40af" />
  
  <!-- Eye highlights -->
  <circle cx="12.5" cy="13.5" r="0.5" fill="white" />
  <circle cx="20.5" cy="13.5" r="0.5" fill="white" />
  
  <!-- Robot mouth -->
  <rect x="14" y="18" width="4" height="1.5" rx="0.75" ry="0.75" fill="#1e40af" />
  
  <!-- Side details -->
  <rect x="6" y="12" width="2" height="4" rx="1" ry="1" fill="white" />
  <rect x="24" y="12" width="2" height="4" rx="1" ry="1" fill="white" />
</svg>
